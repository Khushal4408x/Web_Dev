<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color: rgb(112, 4, 129);
    }
    p{
        text-align: center;
        font-size: 132px;
        color: rgb(255, 255, 255);
    }
</style>
<body>
    <p id="demo"></p>
    <script>
        var countDownDate=new Date("7 feb 2026, 10:23:00").getTime();
        var x=setInterval(function(){
            var now=new Date().getTime();
            var dist=countDownDate-now;
            var days=Math.floor(dist/(1000*60*60*24));
            var hours=Math.floor((dist%(1000*60*60*24))/(1000*60*60));
            var min=Math.floor((dist%(1000*60*60))/(1000*60));
            var sec=Math.floor((dist%(1000*60))/(1000));
            document.getElementById("demo").innerHTML=days+'d '+hours+'h '+min+'m '+sec+'s';
            if(dist<0){
                clearInterval(x);
                document.getElementById('demo').innerHTML="Expired";
            }
        },3);
    </script>
</body>
</html>
