<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    Enter some text: <input type="text"  id="z" oninput="uppercase()">

        let x=document.getElementById('z');
        x.value=x.value.toUpperCase();
    }</script>
