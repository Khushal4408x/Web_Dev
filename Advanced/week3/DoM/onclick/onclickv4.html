<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="z" onmousedown="mousedown()" onmouseup="mouseup()">Lorem ipsum dolor sit amet consectetur adipisicing elit. Harum quisquam, eaque optio atque perspiciatis expedita suscipit hic adipisci blanditiis minima quidem veniam facilis at eos, accusamus molestiae, quae quaerat. Voluptas?</p>
    <script>
        function mousedown(){
            document.getElementById('z').style.color='red';
        }
        function mouseup(){
            document.getElementById('z').style.color='green';
        }
    </script>

</body>
</html>
