<!DOCTYPE html>
<html lang="en">
    <script>
        function populateDiv(){
            const a=document.getElementById("firstnum").value;
            const b=document.getElementById("secnum").value;
            element=document.getElementById("finalSum")
            element.innerHTML=parseInt(a)+parseInt(b );
        }
    </script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="firstnum" type="text" placeholder="first num"> <br>
    <input id="secnum" type="text" placeholder="sec num">  <br>  
    <button onclick="populateDiv()">Calc Sum</button>
    <div id="finalSum"></div>
    <!-- oninput event listner can also be 
    used -->
</body>
</html>
